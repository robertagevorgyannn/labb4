{% extends "base.html" %}

{% block content %}
<h2 style="color: #a67a7a; margin-bottom: 25px; font-weight: 300; letter-spacing: 1px;">✎ редактирование контакта</h2>

<form method="POST" style="max-width: 500px;">
    <div class="form-group">
        <label>фамилия</label>
        <input type="text" 
               name="last_name" 
               class="form-control" 
               value="{{ contact.last_name }}" 
               required
               pattern="[A-Za-zА-Яа-я\s\-]+"
               title="Только буквы, пробелы и дефис">
    </div>
    
    <div class="form-group">
        <label>имя</label>
        <input type="text" 
               name="first_name" 
               class="form-control" 
               value="{{ contact.first_name }}" 
               required
               pattern="[A-Za-zА-Яа-я\s\-]+"
               title="Только буквы, пробелы и дефис">
    </div>
    
    <div class="form-group">
        <label>отчество</label>
        <input type="text" 
               name="middle_name" 
               class="form-control" 
               value="{{ contact.middle_name or '' }}"
               pattern="[A-Za-zА-Яа-я\s\-]+"
               title="Только буквы, пробелы и дефис">
    </div>
    
    <div class="form-group">
        <label>телефон</label>
        <input type="tel" 
               name="phone" 
               class="form-control" 
               value="{{ contact.phone_number }}" 
               required
               pattern="[0-9\+\-\s\(\)]+"
               title="Только цифры, пробелы, скобки, плюс и дефис"
               placeholder="+7 (999) 123-45-67">
    </div>
    
    <div class="form-group">
        <label>заметка</label>
        <textarea name="note" class="form-control" rows="3">{{ contact.note or '' }}</textarea>
    </div>
    
    <div style="display: flex; gap: 12px; margin-top: 30px;">
        <button type="submit" class="btn btn-success">💾 сохранить</button>
        <a href="{{ url_for('index') }}" class="btn btn-primary">↩️ отмена</a>
    </div>
</form>
{% endblock %}
